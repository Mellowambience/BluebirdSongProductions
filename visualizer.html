<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>am i starting to love you?... — BLUEBIRD</title>
  <style>
    :root {
      --void:#0A0A0F;--void2:#0f0f18;
      --gold:#FFD700;--gold-dim:#C9A84C;--pink:#FF6EB4;
      --mint:#A8FFD8;--ghost:#F0F0FF;--purple:#9B30FF;
      --purple-neon:#C060FF;--purple-dull:#5a2d82;
      --text:#e8e0f8;--text-dim:#8a7fa8;
      --border:rgba(155,48,255,0.18);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;background:var(--void)}
    body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;color:var(--text)}
    body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:9999;opacity:.35}
    canvas{position:fixed;inset:0;width:100%;height:100%}
    .cover{position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);width:min(320px,55vmin);height:min(320px,55vmin);border-radius:18px;overflow:hidden;border:1px solid rgba(155,48,255,.35);box-shadow:0 0 60px rgba(155,48,255,.25),0 0 120px rgba(192,96,255,.12);z-index:10;pointer-events:none}
    .cover img{width:100%;height:100%;object-fit:cover;display:block}
    .cover-pulse{position:absolute;inset:0;border-radius:18px;background:radial-gradient(circle at 50% 50%,rgba(192,96,255,.18) 0%,transparent 70%);opacity:0;transition:opacity .08s}
    .info{position:fixed;bottom:0;left:0;right:0;padding:2rem 2rem 2.5rem;background:linear-gradient(0deg,rgba(10,10,15,.92) 0%,transparent 100%);z-index:20;display:flex;align-items:flex-end;justify-content:space-between;gap:1rem}
    .track-meta{display:flex;flex-direction:column;gap:.35rem}
    .track-title{font-size:clamp(1.1rem,4vw,1.7rem);font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,var(--ghost) 0%,var(--purple-neon) 55%,var(--gold) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .track-artist{font-size:.78rem;letter-spacing:.18em;text-transform:uppercase;color:var(--text-dim)}
    .track-style{font-size:.65rem;letter-spacing:.1em;color:var(--gold-dim);font-style:italic;max-width:360px;line-height:1.5}
    .controls{display:flex;flex-direction:column;align-items:flex-end;gap:.8rem;flex-shrink:0}
    .play-btn{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-neon));border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 0 24px rgba(192,96,255,.5);transition:transform .12s,box-shadow .12s;color:#fff;font-size:1.2rem}
    .play-btn:hover{transform:scale(1.08);box-shadow:0 0 36px rgba(192,96,255,.7)}
    .play-btn:active{transform:scale(.95)}
    .progress-wrap{position:fixed;bottom:0;left:0;right:0;height:3px;z-index:30;background:rgba(255,255,255,.06);cursor:pointer}
    .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--purple),var(--gold));transition:width .25s linear}
    .progress-wrap:hover{height:5px;bottom:-1px}
    .back{position:fixed;top:1.4rem;left:1.6rem;z-index:30;font-size:.7rem;letter-spacing:.2em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;display:flex;align-items:center;gap:.5rem;transition:color .2s}
    .back:hover{color:var(--purple-neon)}
    .back::before{content:'←'}
    .brand{position:fixed;top:1.4rem;right:1.6rem;z-index:30;font-size:.65rem;letter-spacing:.28em;text-transform:uppercase;color:var(--gold-dim);border:1px solid rgba(255,215,0,.15);padding:.28rem .8rem;border-radius:50px}
    .loading{position:fixed;inset:0;z-index:100;background:var(--void);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;transition:opacity .5s}
    .loading.hidden{opacity:0;pointer-events:none}
    .loading-text{font-size:.75rem;letter-spacing:.25em;text-transform:uppercase;color:var(--text-dim)}
    .loading-ring{width:40px;height:40px;border-radius:50%;border:2px solid var(--border);border-top-color:var(--purple-neon);animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .play-hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;pointer-events:none;font-size:.72rem;letter-spacing:.22em;text-transform:uppercase;color:var(--text-dim);opacity:0;transition:opacity .4s;text-align:center;margin-top:calc(min(160px,27.5vmin) + 1.5rem)}
    .play-hint.visible{opacity:1}
  </style>
</head>
<body>
<div class="loading" id="loading"><div class="loading-ring"></div><div class="loading-text">Loading track…</div></div>
<canvas id="canvas"></canvas>
<div class="cover" id="cover">
  <img src="https://cdn2.suno.ai/image_large_b3169165-4c8a-4115-a9eb-279861813a36.jpeg" alt="am i starting to love you?..." crossorigin="anonymous" />
  <div class="cover-pulse" id="coverPulse"></div>
</div>
<div class="info">
  <div class="track-meta">
    <div class="track-title">am i starting to love you?...</div>
    <div class="track-artist">Rin · @aetherrose · BLUEBIRD</div>
    <div class="track-style">trance meets hyperpop with soccer mommy vibes meets yumeii and lil peep</div>
  </div>
  <div class="controls">
    <button class="play-btn" id="playBtn" aria-label="Play / Pause">&#9654;</button>
  </div>
</div>
<div class="progress-wrap" id="progressWrap"><div class="progress-fill" id="progressFill"></div></div>
<a class="back" href="index.html">BLUEBIRD</a>
<div class="brand">&#10022; BLUEBIRD</div>
<div class="play-hint" id="playHint">tap to play</div>
<audio id="audio" crossorigin="anonymous" preload="auto">
  <source src="https://cdn1.suno.ai/b3169165-4c8a-4115-a9eb-279861813a36.mp3" type="audio/mpeg" />
</audio>
<script>
const CFG={PARTICLE_COUNT:600,PARTICLE_BASE_RADIUS:1.8,ORBIT_RADIUS_MIN:0.28,ORBIT_RADIUS_MAX:0.48,BASS_FREQ:[0,8],MID_FREQ:[9,40],HIGH_FREQ:[41,100],TRAIL_ALPHA:0.18,COLOR_PALETTE:[[192,96,255],[168,255,216],[255,110,180],[255,215,0],[240,240,255]]};
const canvas=document.getElementById('canvas'),ctx=canvas.getContext('2d'),audio=document.getElementById('audio'),playBtn=document.getElementById('playBtn'),progFill=document.getElementById('progressFill'),progWrap=document.getElementById('progressWrap'),loading=document.getElementById('loading'),coverPulse=document.getElementById('coverPulse'),playHint=document.getElementById('playHint');
let analyser,dataArray,bufLen,audioCtx,sourceNode,audioReady=false,isPlaying=false,particles=[],W,H,cx,cy,frame=0,bass=0,mid=0,high=0,energy=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;cx=W/2;cy=H/2;initParticles()}
window.addEventListener('resize',resize);
function setupAudio(){if(audioReady)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();analyser=audioCtx.createAnalyser();analyser.fftSize=1024;analyser.smoothingTimeConstant=0.82;bufLen=analyser.frequencyBinCount;dataArray=new Uint8Array(bufLen);sourceNode=audioCtx.createMediaElementSource(audio);sourceNode.connect(analyser);analyser.connect(audioCtx.destination);audioReady=true}
function avg(lo,hi){let s=0;for(let i=lo;i<=hi&&i<bufLen;i++)s+=dataArray[i];return s/(hi-lo+1)/255}
class Particle{constructor(i){this.i=i;this.reset(true)}reset(init){const t=Math.random()*Math.PI*2,R=(CFG.ORBIT_RADIUS_MIN+Math.random()*(CFG.ORBIT_RADIUS_MAX-CFG.ORBIT_RADIUS_MIN))*Math.min(W,H);this.baseR=R;this.angle=t;this.speed=(0.0004+Math.random()*0.0008)*(Math.random()<0.5?1:-1);this.color=CFG.COLOR_PALETTE[Math.floor(Math.random()*CFG.COLOR_PALETTE.length)];this.phase=Math.random()*Math.PI*2;this.freqBand=Math.random()<0.4?'bass':(Math.random()<0.6?'mid':'high');this.size=CFG.PARTICLE_BASE_RADIUS*(0.5+Math.random()*1.5);this.radialBob=0.03+Math.random()*0.12;this.opacity=0.4+Math.random()*0.6;if(!init)this.angle=Math.random()*Math.PI*2}update(){const be=this.freqBand==='bass'?bass:(this.freqBand==='mid'?mid:high),punch=1+be*1.8*(1+this.radialBob),bob=Math.sin(frame*0.018+this.phase)*be*30;this.angle+=this.speed*(1+be*2.5);this.r=this.baseR*punch+bob;this.x=cx+Math.cos(this.angle)*this.r;this.y=cy+Math.sin(this.angle)*this.r}draw(){const be=this.freqBand==='bass'?bass:(this.freqBand==='mid'?mid:high),glow=this.size*(1+be*4),[r,g,b]=this.color,a=this.opacity*(0.5+be*0.5);const gr=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,glow*4);gr.addColorStop(0,`rgba(${r},${g},${b},${a})`);gr.addColorStop(0.4,`rgba(${r},${g},${b},${a*0.4})`);gr.addColorStop(1,`rgba(${r},${g},${b},0)`);ctx.beginPath();ctx.arc(this.x,this.y,glow*4,0,Math.PI*2);ctx.fillStyle=gr;ctx.fill();ctx.beginPath();ctx.arc(this.x,this.y,glow,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${Math.min(1,a*1.5)})`;ctx.fill()}}
function initParticles(){particles=Array.from({length:CFG.PARTICLE_COUNT},(_,i)=>new Particle(i))}
function drawWaveRing(){if(!audioReady)return;const td=new Uint8Array(bufLen);analyser.getByteTimeDomainData(td);const R=Math.min(W,H)*0.22,step=Math.PI*2/td.length,eb=1+energy*2;ctx.beginPath();for(let i=0;i<td.length;i++){const v=(td[i]/128)-1,r=R+v*22*eb,ang=i*step,x=cx+Math.cos(ang)*r,y=cy+Math.sin(ang)*r;i===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.closePath();ctx.strokeStyle=`rgba(192,96,255,${0.15+energy*0.35})`;ctx.lineWidth=1.2;ctx.stroke()}
function drawPulseRings(){const cs=Math.min(W,H)*0.28;for(let k=0;k<3;k++){const sc=1+(bass*0.4+mid*0.1)*(k+1)*0.5,r=cs*sc*(1+k*0.15),al=Math.max(0,(0.25-k*0.07)*bass);ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.strokeStyle=`rgba(192,96,255,${al})`;ctx.lineWidth=2-k*0.5;ctx.stroke()}}
function drawFreqArc(){if(!audioReady)return;const BARS=80,R=Math.min(W,H)*0.44,step=bufLen/BARS;for(let i=0;i<BARS;i++){const bs=Math.floor(i*step),be2=Math.floor((i+1)*step);let s=0;for(let b=bs;b<be2&&b<bufLen;b++)s+=dataArray[b];const val=s/(be2-bs)/255,ang=(Math.PI*1.1)+(i/(BARS-1))*Math.PI*0.8,len=val*Math.min(W,H)*0.14,x1=cx+Math.cos(ang)*R,y1=cy+Math.sin(ang)*R,x2=cx+Math.cos(ang)*(R+len),y2=cy+Math.sin(ang)*(R+len);ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.strokeStyle=`hsla(${260+i*1.2},90%,70%,${0.4+val*0.6})`;ctx.lineWidth=2.5;ctx.stroke()}}
function loop(){requestAnimationFrame(loop);frame++;if(audioReady){analyser.getByteFrequencyData(dataArray);const rb=avg(...CFG.BASS_FREQ),rm=avg(...CFG.MID_FREQ),rh=avg(...CFG.HIGH_FREQ),re=(rb*0.5+rm*0.3+rh*0.2),s=0.18;bass+=( rb-bass)*s;mid+=(rm-mid)*s;high+=(rh-high)*s;energy+=(re-energy)*s}else{const t=frame*0.012;bass=0.08+Math.sin(t)*0.04;mid=0.06+Math.sin(t*1.3+1)*0.03;high=0.04+Math.sin(t*0.7+2)*0.02;energy=(bass+mid+high)/3}ctx.fillStyle=`rgba(10,10,15,${CFG.TRAIL_ALPHA})`;ctx.fillRect(0,0,W,H);drawPulseRings();drawFreqArc();drawWaveRing();particles.forEach(p=>{p.update();p.draw()});coverPulse.style.opacity=bass*1.2;if(!audio.paused&&audio.duration)progFill.style.width=(audio.currentTime/audio.duration*100)+'%'}
async function togglePlay(){setupAudio();if(audioCtx.state==='suspended')await audioCtx.resume();if(isPlaying){audio.pause();isPlaying=false;playBtn.innerHTML='&#9654;'}else{try{await audio.play();isPlaying=true;playBtn.innerHTML='&#9646;&#9646;';playHint.classList.remove('visible')}catch(e){console.warn(e)}}}
playBtn.addEventListener('click',togglePlay);
progWrap.addEventListener('click',e=>{if(!audio.duration)return;audio.currentTime=(e.offsetX/progWrap.offsetWidth)*audio.duration});
audio.addEventListener('canplaythrough',()=>{loading.classList.add('hidden');playHint.classList.add('visible')});
audio.addEventListener('ended',()=>{isPlaying=false;playBtn.innerHTML='&#9654;';progFill.style.width='0%'});
audio.addEventListener('error',()=>{loading.querySelector('.loading-text').textContent='Audio unavailable'});
resize();loop();
</script>
</body>
</html>
